 <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бібліотека книг</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 Бібліотека книг</h1>
        <p class="subtitle">Практична робота №7. Варіант 4</p>

        <div class="controls">
            <button onclick="showBooks()">Показати всі книги</button>
            <button onclick="searchBooks()">Пошук за назвою / автором</button>
            <button onclick="filterBooks()">Фільтр за жанром і рейтингом</button>
            <button onclick="showTopBooks()">Топ-5 книг</button>
            <button onclick="showStatistics()">Статистика</button>
            <button onclick="showSetOperations()">Операції з множинами</button>
            <button onclick="resetOutput()">Очистити</button>
        </div>

        <div id="output">
            Натисни кнопку для виконання операції.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
